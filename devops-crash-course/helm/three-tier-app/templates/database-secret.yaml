{{- if .Values.database.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.database.auth.username }}
  POSTGRES_PASSWORD: {{ .Values.database.auth.password }}
  POSTGRES_DB: {{ .Values.database.auth.database }}
{{- end }}
