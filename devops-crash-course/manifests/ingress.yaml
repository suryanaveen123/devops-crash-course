apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: three-tier-ingress
  namespace: three-tier-demo
spec:
  ingressClassName: nginx
  rules:
    - host: three-tier.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
  # Optional: uncomment for TLS
  # tls:
  #   - hosts: [three-tier.local]
  #     secretName: three-tier-tls
